<!DOCTYPE html>
<html>
<head>
    <title>AI Test Agent</title>

    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:700px;
            background:white;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.15);
            display:flex;
            flex-direction:column;
            height:80vh;
        }

        .chat{
            flex:1;
            overflow-y:auto;
            padding:20px;
        }

        .message{
            margin-bottom:15px;
        }

        .user{
            text-align:right;
        }

        .user span{
            background:#007bff;
            color:white;
            padding:10px 15px;
            border-radius:10px;
            display:inline-block;
        }

        .bot span{
            background:#eee;
            padding:10px 15px;
            border-radius:10px;
            display:inline-block;
        }

        .input-area{
            display:flex;
            border-top:1px solid #ddd;
        }

        input{
            flex:1;
            padding:15px;
            border:none;
            font-size:16px;
        }

        button{
            width:120px;
            border:none;
            background:#007bff;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        h3 { margin:5px 0; }
        h4 { margin-top:10px; }
        p { margin:5px 0; }

    </style>
</head>

<body>

<div class="container">

    <div id="chat" class="chat"></div>

    <div class="input-area">
        <input id="instruction" placeholder="Enter instruction...">
        <button onclick="sendInstruction()">Send</button>
    </div>

</div>

<script>

// ✅ FORMAT FUNCTION (OUTSIDE)
function formatOutput(data) {

    let html = "";

    // Status
    if (data.execution_result) {
        const status = data.execution_result.status;

        html += `<h3 style="color:${status==="success"?"green":"red"}">
                    Test Status: ${status.toUpperCase()}
                 </h3>`;
    }

    // Steps
    if (data.parsed_output && data.parsed_output.steps) {
        html += `<h4>Steps:</h4>`;

        data.parsed_output.steps.forEach(step => {
            html += `<p>➡ ${step.action} → ${step.target || ""}</p>`;
        });
    }

    // Message
    if (data.execution_result && data.execution_result.message) {
        html += `<p><b>Message:</b> ${data.execution_result.message}</p>`;
    }

    return html;
}

async function sendInstruction(){

    const inputBox = document.getElementById("instruction");
    const instruction = inputBox.value;

    if(!instruction) return;

    const chat = document.getElementById("chat");

    // Clear previous
    chat.innerHTML = "";

    // Show user message
    chat.innerHTML = `
        <div class="message user">
            <span>${instruction}</span>
        </div>
    `;

    inputBox.value = "";

    // Show loading
    chat.innerHTML += `
        <div class="message bot" id="loading">
            <span>Processing...</span>
        </div>
    `;

    // 🔥 CALL BACKEND
    const response = await fetch("/langgraph",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            instruction:instruction
        })
    });

    const data = await response.json();

    // Remove loading
    document.getElementById("loading").remove();

    // ✅ SHOW FORMATTED OUTPUT
    chat.innerHTML += `
        <div class="message bot">
            <span>${formatOutput(data)}</span>
        </div>
    `;
}

</script>

</body>
</html>
